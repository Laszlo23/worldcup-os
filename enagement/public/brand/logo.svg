<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="MatchMind AI">
  <defs>
    <linearGradient id="mm-g" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="mm-glow" cx="32" cy="30" r="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#0a1018" stop-opacity="0"/>
    </radialGradient>
    <filter id="mm-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="#070b12"/>
  <circle cx="32" cy="32" r="26" fill="url(#mm-glow)"/>
  <!-- Crosshair ring -->
  <circle cx="32" cy="32" r="18" stroke="url(#mm-g)" stroke-width="2.4" filter="url(#mm-soft)"/>
  <path d="M32 8v7M32 49v7M8 32h7M49 32h7" stroke="url(#mm-g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Eye -->
  <path
    d="M18.5 32c3.8-6.2 8.8-9.4 13.5-9.4S41.7 25.8 45.5 32c-3.8 6.2-8.8 9.4-13.5 9.4S22.3 38.2 18.5 32Z"
    stroke="url(#mm-g)"
    stroke-width="2.2"
    stroke-linejoin="round"
  />
  <circle cx="32" cy="32" r="6.2" stroke="url(#mm-g)" stroke-width="2"/>
  <!-- Pulse / heartbeat -->
  <path
    d="M26.2 32h2.2l1.4-3.2 2.2 6.4 1.6-3.2H37.8"
    stroke="url(#mm-g)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
