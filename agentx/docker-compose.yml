services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: txline
      POSTGRES_PASSWORD: txline_dev
      POSTGRES_DB: txline_ai_trader
    ports:
      - "5433:5432"
    volumes:
      - txline_ai_pg:/var/lib/postgresql/data

volumes:
  txline_ai_pg:
